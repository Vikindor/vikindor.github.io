<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vikindor</title>
    <link rel="icon" type="image/png" href="icons/github_icon.png">
  <style>
    :root { --bg:#0b0d12; --card:#12151d; --ink:#e8eefc; --muted:#b6c2e2; --acc:#7aa2ff; }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0; font:16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, Inter, "Noto Sans", Arial; color:var(--ink); background:radial-gradient(1200px 800px at 80% -10%, #1b2030, #0b0d12 60%);}    
    a{color:var(--acc); text-decoration:none}
    a:hover{text-decoration:underline}
    .wrap{max-width:900px; margin:0 auto; padding:32px 20px 64px}
    header{display:flex; gap:20px; align-items:center; margin:20px 0 28px}
    .avatar{width:72px; height:72px; border-radius:18px; background:linear-gradient(135deg,#24324a,#1b2335); display:grid; place-items:center; font-size:36px}
    h1{font-size:28px; line-height:1.2; margin:0}
    .sub{color:var(--muted)}
    .card{background:var(--card); border:1px solid rgba(255,255,255,.06); border-radius:16px; padding:18px 18px}
    .grid{display:grid; gap:18px; grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
    .btns{display:flex; flex-wrap:wrap; gap:10px; margin-top:12px}
    .btn{display:inline-flex; align-items:center; gap:8px; padding:10px 14px; border-radius:12px; background:#182033; border:1px solid rgba(255,255,255,.08)}
    .btn:hover{background:#1b2740}
    h2{font-size:18px; margin:0 0 8px}
    ul{margin:10px 0 0 18px}
    footer{margin-top:36px; color:var(--muted); font-size:14px}
    code{background:#1a2135; padding:2px 6px; border-radius:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="avatar" aria-hidden="true">V</div>
      <div>
        <h1>Vikindor</h1>
        <div class="sub"></div>
        <div class="btns" role="navigation">
          <a class="btn" href="https://github.com/Vikindor" target="_blank" rel="noopener">🐙 GitHub</a>
          <a class="btn" href="mailto:vikindor@protonmail.com">📧 Mail me</a>
        </div>
      </div>
    </header>

    <section class="grid" aria-label="about and skills">
      <div class="card">
        <h2>About</h2>
        <p>❤️ QA</p>
      </div>
    </section>

    <footer>
      <p>Hosted on GitHub Pages. Repo: <code>vikindor.github.io</code>.</p>
    </footer>
  </div>
</body>
</html>
